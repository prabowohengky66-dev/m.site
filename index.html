<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Playlist</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
display:flex;
height:100vh;
overflow:hidden;
}
.sidebar{
width:320px;
background:#1b1b1b;
overflow-y:auto;
border-right:1px solid #333;
}
.item{
padding:15px;
border-bottom:1px solid #333;
cursor:pointer;
}
.item:hover{
background:#333;
}
.active{
background:#ff0033;
}
.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}
video{
width:100%;
max-width:900px;
max-height:80vh;
background:#000;
border-radius:10px;
}
.controls{
margin-top:15px;
display:flex;
gap:10px;
}
button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#ff0033;
color:white;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#d4002b;
}
@media(max-width:768px){
body{
flex-direction:column;
}
.sidebar{
width:100%;
height:220px;
}
/* Popup Overlay */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#1b1b1b;
padding:25px;
border-radius:12px;
text-align:center;
max-width:400px;
width:90%;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.popup-box h2{
margin-bottom:15px;
}

.popup-box p{
margin-bottom:20px;
line-height:1.6;
}

.close-btn{
background:#ff0033;
color:#fff;
border:none;
padding:12px 24px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.close-btn:hover{
background:#d4002b;

}
</style>
</head>

<body>
<div class="popup" id="popup">

<div class="popup-box">

<h2>🎬 Welcome</h2>

<p>Click Close to watch the video.</p>

<button class="close-btn" onclick="closePopup()">
❌ Close
</button>

</div>

</div>
<div class="sidebar" id="playlist"></div>

<div class="main">

<video id="player" controls autoplay></video>

<div class="controls">
<button onclick="prevVideo()">⏮ Previous</button>
<button onclick="nextVideo()">Next ⏭</button>
</div>

</div>

<script>
function closePopup(){

document.getElementById("popup").style.display="none";

const videos=[

"https://cdn.videy.co/ngVHH4RJ1.mp4",
"https://cdn.videy.co/WWKWMEBj1.mp4",
"https://cdn.videy.co/HgK0qgDP1.mp4",
"https://cdn.videy.co/3ttnEjDt1.mp4",
"https://cdn.videy.co/ej5F0jlE1.mp4",
"https://cdn.videy.co/EnPkpEMC1.mp4",
"https://cdn.videy.co/ksnCnJjL1.mp4",
"https://cdn.videy.co/rNW7sJf91.mp4",
"https://cdn.videy.co/EGKmje6t1.mp4",
"https://cdn.videy.co/HWtQMgyI1.mp4",
"https://cdn.videy.co/smMnJo6V1.mp4",
"https://cdn.videy.co/JjTLcUvw1.mp4",
"https://cdn.videy.co/OOyY3kAd1.mp4",
"https://cdn.videy.co/tczq8Hrx1.mp4",
"https://cdn.videy.co/byBBSLDt1.mp4",
"https://cdn.videy.co/DuYheKHq1.mp4",
"https://cdn.videy.co/dAWABY8e1.mp4",
"https://cdn.videy.co/d94lkIFM1.mp4",
"https://cdn.videy.co/HgA4F2ZI1.mp4",
"https://cdn.videy.co/tXyBPxNo1.mp4"

];

let current=0;

const player=document.getElementById("player");
const playlist=document.getElementById("playlist");

function loadVideo(i){

current=i;

player.src=videos[i];

player.play();

document.querySelectorAll(".item").forEach((e,index)=>{

e.classList.toggle("active",index===i);

});

}

videos.forEach((v,i)=>{

const div=document.createElement("div");

div.className="item";

div.innerHTML="🎬 Video "+(i+1);

div.onclick=()=>loadVideo(i);

playlist.appendChild(div);

});

function nextVideo(){

current++;

if(current>=videos.length) current=0;

loadVideo(current);

}

function prevVideo(){

current--;

if(current<0) current=videos.length-1;

loadVideo(current);

}

player.onended=nextVideo;

loadVideo(0);

</script>

</body>
</html>
